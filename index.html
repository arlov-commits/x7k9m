<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--surface3:#2e2e2e;--border:#333;--text:#e8e4df;--text-dim:#9a958e;--text-muted:#6a6560;--accent-bh:#c9a227;--accent-bh-dim:rgba(201,162,39,.15);--accent-wh:#5e8c6a;--accent-wh-dim:rgba(94,140,106,.15);--accent-cn:#b85c38;--accent-cn-dim:rgba(184,92,56,.15);--accent-ab:#6a7ec9;--accent-ab-dim:rgba(106,126,201,.15);--accent-life:#9a7bb5;--accent-life-dim:rgba(154,123,181,.15);--danger:#c94444;--danger-dim:rgba(201,68,68,.12);--warning:#c98b27;--warning-dim:rgba(201,139,39,.12);--ok:#5e8c6a;--ok-dim:rgba(94,140,106,.12)}
[data-theme="light"]{--bg:#f5f0e8;--surface:#fffcf5;--surface2:#f0ebe0;--surface3:#e5dfd4;--border:#d5cfc4;--text:#2a2520;--text-dim:#5a5248;--text-muted:#8a8278;--accent-bh:#a88520;--accent-bh-dim:rgba(168,133,32,.12);--accent-wh:#3d7a4f;--accent-wh-dim:rgba(61,122,79,.12);--accent-cn:#a04828;--accent-cn-dim:rgba(160,72,40,.12);--accent-ab:#4a60b0;--accent-ab-dim:rgba(74,96,176,.12);--accent-life:#7a5a9a;--accent-life-dim:rgba(122,90,154,.12);--danger:#b83030;--danger-dim:rgba(184,48,48,.1);--warning:#a07020;--warning-dim:rgba(160,112,32,.1);--ok:#3d7a4f;--ok-dim:rgba(61,122,79,.1)}
[data-theme="ember"]{--bg:#1c1a18;--surface:#2a2724;--surface2:#353230;--surface3:#44403a;--border:#44403a;--text:#e8ddd0;--text-dim:#9a8e80;--text-muted:#7a7068;--accent-bh:#d4a030;--accent-bh-dim:rgba(212,160,48,.18);--accent-wh:#6aaa5a;--accent-wh-dim:rgba(106,170,90,.18);--accent-cn:#d48a3a;--accent-cn-dim:rgba(212,138,58,.18);--accent-ab:#d0a840;--accent-ab-dim:rgba(208,168,64,.18);--accent-life:#d08040;--accent-life-dim:rgba(208,128,64,.18);--danger:#c05848;--danger-dim:rgba(192,88,72,.15);--warning:#d0a840;--warning-dim:rgba(208,168,64,.15);--ok:#6aaa5a;--ok-dim:rgba(106,170,90,.15)}
[data-theme="persia"]{--bg:#f2e6d0;--surface:#faf3e6;--surface2:#e8d8be;--surface3:#dccaa8;--border:#c8b898;--text:#2e1a0e;--text-dim:#7a5c3e;--text-muted:#9a8060;--accent-bh:#1a8a82;--accent-bh-dim:rgba(26,138,130,.12);--accent-wh:#5a8040;--accent-wh-dim:rgba(90,128,64,.12);--accent-cn:#c46a30;--accent-cn-dim:rgba(196,106,48,.12);--accent-ab:#b8860b;--accent-ab-dim:rgba(184,134,11,.12);--accent-life:#8a5a80;--accent-life-dim:rgba(138,90,128,.12);--danger:#b84040;--danger-dim:rgba(184,64,64,.1);--warning:#b8860b;--warning-dim:rgba(184,134,11,.1);--ok:#1a8a82;--ok-dim:rgba(26,138,130,.1)}
[data-theme="ocean"]{--bg:#1a2a3a;--surface:#223344;--surface2:#2a3e52;--surface3:#345068;--border:#3a4a5a;--text:#e0e8f0;--text-dim:#8899aa;--text-muted:#667788;--accent-bh:#e8c040;--accent-bh-dim:rgba(232,192,64,.15);--accent-wh:#50b080;--accent-wh-dim:rgba(80,176,128,.15);--accent-cn:#e87060;--accent-cn-dim:rgba(232,112,96,.15);--accent-ab:#6090c0;--accent-ab-dim:rgba(96,144,192,.15);--accent-life:#d0a850;--accent-life-dim:rgba(208,168,80,.15);--danger:#e07060;--danger-dim:rgba(224,112,96,.12);--warning:#d0a850;--warning-dim:rgba(208,168,80,.12);--ok:#50b080;--ok-dim:rgba(80,176,128,.12)}
[data-theme="savanna"]{--bg:#f0e0c8;--surface:#f8f0e0;--surface2:#e0d0b0;--surface3:#d0c098;--border:#c8b090;--text:#3a2010;--text-dim:#7a6040;--text-muted:#9a8868;--accent-bh:#a08020;--accent-bh-dim:rgba(160,128,32,.12);--accent-wh:#5a8040;--accent-wh-dim:rgba(90,128,64,.12);--accent-cn:#c05020;--accent-cn-dim:rgba(192,80,32,.12);--accent-ab:#507090;--accent-ab-dim:rgba(80,112,144,.12);--accent-life:#8a6830;--accent-life-dim:rgba(138,104,48,.12);--danger:#a83820;--danger-dim:rgba(168,56,32,.1);--warning:#a08020;--warning-dim:rgba(160,128,32,.1);--ok:#5a8040;--ok-dim:rgba(90,128,64,.1)}
[data-theme="midnight"]{--bg:#0e1a12;--surface:#162218;--surface2:#1e2e22;--surface3:#2a4030;--border:#2a4030;--text:#d0e0d0;--text-dim:#78a080;--text-muted:#5a8060;--accent-bh:#c0a850;--accent-bh-dim:rgba(192,168,80,.15);--accent-wh:#60aa70;--accent-wh-dim:rgba(96,170,112,.15);--accent-cn:#c88850;--accent-cn-dim:rgba(200,136,80,.15);--accent-ab:#6090b0;--accent-ab-dim:rgba(96,144,176,.15);--accent-life:#d0808a;--accent-life-dim:rgba(208,128,138,.15);--danger:#c06868;--danger-dim:rgba(192,104,104,.12);--warning:#c0a850;--warning-dim:rgba(192,168,80,.12);--ok:#60aa70;--ok-dim:rgba(96,170,112,.12)}
[data-theme="temple"]{--bg:#c0c0c0;--surface:#ffffff;--surface2:#c0c0c0;--surface3:#a0a0a0;--border:#000000;--text:#000000;--text-dim:#000080;--text-muted:#808080;--accent-bh:#808000;--accent-bh-dim:rgba(128,128,0,.2);--accent-wh:#008000;--accent-wh-dim:rgba(0,128,0,.2);--accent-cn:#800000;--accent-cn-dim:rgba(128,0,0,.2);--accent-ab:#000080;--accent-ab-dim:rgba(0,0,128,.2);--accent-life:#800080;--accent-life-dim:rgba(128,0,128,.2);--danger:#ff0000;--danger-dim:rgba(255,0,0,.15);--warning:#808000;--warning-dim:rgba(128,128,0,.15);--ok:#008000;--ok-dim:rgba(0,128,0,.15)}
[data-theme="temple"] *{font-family:'Courier New',Courier,monospace!important;border-radius:0!important;letter-spacing:0!important;text-transform:none!important}
[data-theme="temple"] .header h1{font-family:'Courier New',Courier,monospace!important;font-size:1.4rem;text-transform:uppercase!important}
[data-theme="temple"] .chip,[data-theme="temple"] .bank-chip{border:2px solid #000!important;font-weight:700}
[data-theme="temple"] .tab{border:2px solid #000!important}
[data-theme="temple"] .tab.active{background:#000080!important;color:#ffff00!important}
[data-theme="temple"] .day-row,[data-theme="temple"] .life-item,[data-theme="temple"] .ms-item{border:1px solid #000!important}
[data-theme="temple"] .notes-box{border:2px solid #000!important}
[data-theme="temple"] .week-badge.current{background:#ffff00!important;color:#000!important;border:2px solid #000!important}
[data-theme="temple"] .week-badge.break{background:#00ff00!important;color:#000!important;border:2px solid #000!important}
[data-theme="temple"] .save-status.saved{color:#008000}
[data-theme="temple"] .legend{border:2px solid #000!important}
[data-theme="temple"] .task-bank{border:2px solid #800080!important}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;transition:background .3s,color .3s}
.app{max-width:900px;margin:0 auto;padding:28px 16px 80px}
.header{display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap}
.header h1{font-family:'Crimson Pro',serif;font-size:1.6rem;font-weight:600;letter-spacing:-.02em}
.today-badge{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text-dim);background:var(--surface2);padding:3px 9px;border-radius:16px}
.save-status{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--text-muted);display:flex;align-items:center;gap:5px;transition:color .3s}
.save-status.saving{color:var(--warning)}.save-status.saved{color:var(--ok)}.save-status.error{color:var(--danger)}
.save-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.theme-toggle{margin-left:auto;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:5px 11px;border-radius:16px;cursor:pointer;font-family:'Outfit';font-size:.75rem;font-weight:500}
.theme-toggle:hover{color:var(--text);border-color:var(--text-dim)}
.version-label{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text-muted);margin-left:8px;white-space:nowrap}
.subtitle{color:var(--text-dim);font-size:.78rem;margin-bottom:22px}
.tabs{display:flex;gap:2px;margin-bottom:22px;background:var(--surface);border-radius:9px;padding:3px;width:fit-content;border:1px solid var(--border);flex-wrap:wrap}
.tab{padding:7px 14px;border:none;background:0;color:var(--text-dim);font-family:'Outfit';font-size:.78rem;font-weight:600;cursor:pointer;border-radius:6px;transition:all .2s}
.tab:hover{color:var(--text)}.tab.active{background:var(--surface3);color:var(--text)}
.view{display:none}.view.active{display:block}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;width:fit-content}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.78rem;font-weight:600;color:var(--text-dim)}
.legend-dot{width:10px;height:10px;border-radius:3px}
.legend-dot.bh{background:var(--accent-bh)}.legend-dot.wh{background:var(--accent-wh)}.legend-dot.cn{background:var(--accent-cn)}.legend-dot.ab{background:var(--accent-ab)}.legend-dot.life{background:var(--accent-life)}
.legend-hint{font-size:.72rem;color:var(--text-muted);font-style:italic}

/* Dashboard */
.dash-table{display:grid;gap:10px;margin-bottom:24px}
.dash-col-hdrs,.dash-grid-row{display:grid;gap:8px;padding:0 4px}
.dash-col-hdr{font-family:'Crimson Pro',serif;font-size:.9rem;font-weight:600;text-align:center;padding:8px 4px;border-bottom:2px solid;border-radius:6px 6px 0 0}
.dash-col-hdr.bh{border-color:var(--accent-bh);color:var(--accent-bh)}.dash-col-hdr.wh{border-color:var(--accent-wh);color:var(--accent-wh)}.dash-col-hdr.cn{border-color:var(--accent-cn);color:var(--accent-cn)}.dash-col-hdr.ab{border-color:var(--accent-ab);color:var(--accent-ab)}
.dash-cell{background:var(--surface);border-radius:7px;padding:10px 12px;text-align:center;border:1px solid var(--border);min-height:60px;display:flex;flex-direction:column;justify-content:center}
.dash-cell-empty{background:0;border:1px dashed var(--border);opacity:.3}
.dc-title{font-family:'Crimson Pro',serif;font-size:.88rem;font-weight:600;margin-bottom:4px}
.dc-due{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text-dim)}
.dc-days{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600;margin-top:2px}
.dc-days.urgent{color:var(--danger)}.dc-days.soon{color:var(--warning)}.dc-days.ok{color:var(--ok)}.dc-days.past{color:var(--text-muted);text-decoration:line-through}
.dc-tag{display:inline-block;font-size:.58rem;font-weight:700;text-transform:uppercase;padding:1px 5px;border-radius:3px;margin-top:4px}
.notes-box{background:var(--surface);border-radius:9px;padding:14px 18px;margin-bottom:20px;border:1px solid var(--border)}
.notes-box-title{font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);margin-bottom:6px}
.notes-box-text{font-size:.8rem;color:var(--text-dim);line-height:1.7}
.notes-box-text strong{color:var(--text)}

/* Sprint */
.week-section{margin-bottom:26px}
.week-hdr{display:flex;align-items:baseline;gap:9px;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.week-hdr-title{font-family:'Crimson Pro',serif;font-size:1.15rem;font-weight:600}
.week-hdr-dates{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text-dim)}
.week-hdr-hours{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text-muted);margin-left:auto}
.week-badge{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:4px}
.week-badge.current{color:var(--warning);background:var(--warning-dim)}.week-badge.break{color:var(--ok);background:var(--ok-dim)}

.task-bank{background:var(--surface);border:1px solid var(--accent-life);border-radius:8px;padding:10px 14px;margin-bottom:14px}
.task-bank-title{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--accent-life);margin-bottom:8px}
.bank-items{display:flex;flex-wrap:wrap;gap:6px}
.bank-chip{font-size:.78rem;padding:9px 11px;border-radius:10px;font-weight:500;line-height:1.3;display:inline-flex;align-items:center;gap:6px;background:var(--accent-life-dim);color:var(--accent-life);border:1px solid transparent}
.bank-chip.allocating{border:1px solid var(--accent-life);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.bank-btn{width:24px;height:24px;border-radius:50%;border:none;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--surface3);color:var(--text-dim);transition:all .12s;flex-shrink:0}
.bank-btn:hover{color:var(--text);background:var(--border)}
.bank-btn.alloc{background:var(--accent-life-dim);color:var(--accent-life)}.bank-btn.alloc:hover{background:var(--accent-life);color:#fff}
.bank-btn.done-btn{background:var(--ok-dim);color:var(--ok)}.bank-btn.done-btn:hover{background:var(--ok);color:#fff}
.bank-btn.remove-btn:hover{background:var(--danger-dim);color:var(--danger)}
.bank-empty{font-size:.74rem;color:var(--text-muted);font-style:italic}

.day-row{display:grid;grid-template-columns:78px 1fr auto;gap:8px;margin-bottom:5px;padding:8px 10px;background:var(--surface);border-radius:7px;min-height:42px;border:2px solid transparent;transition:all .15s;cursor:default}
.day-row.alloc-target{cursor:pointer}.day-row.alloc-target:hover{border-color:var(--accent-life);background:var(--surface2)}
.day-row.alloc-highlight{border-color:var(--accent-life);background:var(--surface2)}
.day-row.is-today{border-left:3px solid var(--warning)}
.day-left{display:flex;flex-direction:column;gap:1px}
.day-name{font-weight:600;font-size:.8rem}
.day-meta{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--text-dim)}
.day-right{display:flex;align-items:center;gap:6px;min-width:70px;justify-content:flex-end}
.day-budget{font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:600;white-space:nowrap}
.day-budget.over{color:var(--danger)}.day-budget.under{color:var(--ok)}.day-budget.exact{color:var(--text-dim)}

/* Round + add button */
.add-day-btn{width:26px;height:26px;border-radius:50%;border:1px dashed var(--border);background:0;color:var(--text-muted);font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.add-day-btn:hover{color:var(--text-dim);border-color:var(--text-muted);background:var(--surface2)}

.day-tasks-area{display:flex;flex-wrap:wrap;gap:5px;min-height:28px;align-content:flex-start}

.chip{font-size:.78rem;padding:9px 11px;border-radius:10px;font-weight:500;line-height:1.3;display:inline-flex;align-items:center;gap:5px;cursor:grab;position:relative;max-width:100%;transition:opacity .15s,transform .15s;user-select:none}
.chip:active{cursor:grabbing}.chip.dragging{opacity:.3;transform:scale(.95)}
.chip.bh{background:var(--accent-bh-dim);color:var(--accent-bh)}.chip.wh{background:var(--accent-wh-dim);color:var(--accent-wh)}.chip.cn{background:var(--accent-cn-dim);color:var(--accent-cn)}.chip.ab{background:var(--accent-ab-dim);color:var(--accent-ab)}.chip.life{background:var(--accent-life-dim);color:var(--accent-life)}
.chip.high{border:1px solid;font-weight:700}.chip.done{opacity:.35;text-decoration:line-through}
.chip[data-tip]::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);padding:3px 8px;background:var(--text);color:var(--bg);font-size:.65rem;font-weight:600;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:20}
.chip[data-tip]:hover::after{opacity:1}
.chip-acts{display:none;position:absolute;top:-5px;right:-5px;gap:2px;z-index:10}
.chip:hover .chip-acts{display:flex}
.chip-btn{width:20px;height:20px;border-radius:50%;border:none;font-size:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--text);color:var(--bg);transition:all .12s;opacity:.85}
.chip-btn:hover{opacity:1}
.chip-btn.life-return{background:var(--accent-life);color:#fff}
.chip-btn.life-complete{background:var(--ok);color:#fff}
.chip-btn.life-remove{background:var(--danger-dim);color:var(--danger)}.chip-btn.life-remove:hover{background:var(--danger);color:#fff}
.chip.drop-before{box-shadow:-3px 0 0 0 var(--accent-bh)}.chip.drop-after{box-shadow:3px 0 0 0 var(--accent-bh)}

.day-note-row{grid-column:1/-1;margin-top:1px}
.day-note-btn{font-size:.64rem;color:var(--text-muted);cursor:pointer;background:0;border:0;font-family:'Outfit';padding:1px 0}.day-note-btn:hover{color:var(--text-dim)}
.day-note-input{width:100%;margin-top:3px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Outfit';font-size:.76rem;padding:5px 9px;border-radius:5px;resize:vertical;min-height:28px}
.day-note-input:focus{outline:0;border-color:var(--text-dim)}

/* Backward */
.bp-section{margin-bottom:26px}
.bp-hdr{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.bp-dot{width:10px;height:10px;border-radius:50%}
.bp-dot.bh{background:var(--accent-bh)}.bp-dot.wh{background:var(--accent-wh)}.bp-dot.cn{background:var(--accent-cn)}.bp-dot.ab{background:var(--accent-ab)}
.bp-hdr-title{font-family:'Crimson Pro',serif;font-size:1.05rem;font-weight:600}
.bp-hdr-due{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text-dim);margin-left:auto}
.ms-track{position:relative;padding-left:22px}
.ms-track::before{content:'';position:absolute;left:4px;top:0;bottom:0;width:1px;background:var(--border)}
.ms-item{position:relative;padding:7px 12px;margin-bottom:4px;background:var(--surface);border-radius:6px;display:flex;align-items:center;gap:10px;border:1px solid transparent;cursor:pointer;transition:background .12s}
.ms-item:hover{background:var(--surface2)}.ms-item.tbd{border:1px dashed var(--text-muted);background:0;cursor:default}
.ms-item::before{content:'';position:absolute;left:-18px;top:50%;transform:translateY(-50%);width:7px;height:7px;border-radius:50%;border:2px solid var(--border);background:var(--bg)}
.ms-item.active::before{background:var(--warning);border-color:var(--warning)}.ms-item.done::before{background:var(--ok);border-color:var(--ok)}
.ms-date{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text-dim);min-width:75px;flex-shrink:0}
.ms-label{font-size:.8rem;font-weight:500;flex:1}.ms-detail{color:var(--text-dim);font-weight:400;font-size:.74rem}
.ms-note-btn{width:22px;height:22px;border-radius:50%;border:none;background:0;color:var(--text-muted);cursor:pointer;font-size:.6rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;opacity:.5}
.ms-note-btn:hover{opacity:1;background:var(--surface3)}.ms-note-btn.has-note{opacity:.85;color:var(--accent-life);background:var(--accent-life-dim)}
.ms-note-area{width:100%;margin-top:3px;padding:0 12px 6px}
.ms-note-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Outfit';font-size:.74rem;padding:5px 8px;border-radius:5px;resize:vertical;min-height:26px}
.ms-note-input:focus{outline:0;border-color:var(--text-dim)}

/* Life Tasks */
.life-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.life-title{font-family:'Crimson Pro',serif;font-size:1.15rem;font-weight:600}
.life-add-form{display:flex;gap:5px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.life-input{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Outfit';font-size:.78rem;padding:7px 10px;border-radius:6px}
.life-input:focus{outline:0;border-color:var(--text-dim)}.life-input::placeholder{color:var(--text-muted)}
.life-select{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Outfit';font-size:.74rem;padding:6px 8px;border-radius:5px}

function renderDash(){const cats=['cn','bh','wh','ab'];const groups={};cats.forEach(c=>{groups[c]=state.deliverables.filter(d=>d.cat===c)});const mx=Math.max(...cats.map(c=>groups[c].length)),gc=`repeat(${cats.length},1fr)`;let h=`<div class="dash-table"><div class="dash-col-hdrs" style="display:grid;grid-template-columns:${gc};gap:8px">${cats.map(c=>`<div class="dash-col-hdr ${c}">${CAT_NAMES[c]}</div>`).join('')}</div>`;for(let r=0;r<mx;r++){h+=`<div class="dash-grid-row" style="display:grid;grid-template-columns:${gc};gap:8px;margin-top:6px">`;cats.forEach(c=>{const d=groups[c][r];if(!d){h+=`<div class="dash-cell dash-cell-empty"></div>`;return}const dd=parseDate(d.due),dl=daysBetween(TODAY,dd),uc=dl<0?'past':dl<=7?'urgent':dl<=21?'soon':'ok',ds=dl<0?Math.abs(dl)+'d ago':dl===0?'TODAY':dl+'d',ts=d.tbd?'background:var(--surface3);color:var(--text-dim)':'background:var(--accent-'+c+'-dim);color:var(--accent-'+c+')';h+=`<div class="dash-cell"><div class="dc-title">${d.title}</div><div class="dc-due">${d.tbd?'~':''}${fmtDate(dd)}</div><div class="dc-days ${uc}">${ds}</div><span class="dc-tag" style="${ts}">${d.tag}</span></div>`});h+='</div>'}h+='</div>';const op=state.lifeTasks.filter(t=>!t.done);if(op.length)h+=`<div class="notes-box" style="border-left:3px solid var(--accent-life)"><div class="notes-box-title" style="color:var(--accent-life)">Life Tasks · ${op.length} open · ${op.reduce((s,t)=>s+t.hours,0)}h</div></div>`;h+=`<div class="notes-box"><div class="notes-box-title">Strategy</div><div class="notes-box-text"><strong>Readings = paper research.</strong> BH → strand paper. ABI → ABI paper.<br><strong>Spring Break:</strong> ~30h. BH drafting window.<br><strong>Abhidhamma:</strong> Outline 4/19, draft 4/22, submit 4/23.<br><strong>WH Paper(s):</strong> 6h each.</div></div>`;return h}

function startAllocate(id){allocatingId=allocatingId===id?null:id;render()}
function placeAllocated(date){if(!allocatingId)return;const lt=state.lifeTasks.find(t=>t.id===allocatingId);if(lt){state.tasks.push({id:state.nextId++,date,cat:'life',name:lt.name,hours:lt.hours,priority:lt.priority==='high'?'high':'normal',done:false,lifeSourceId:lt.id});lt.inBank=false;allocatingId=null;render();scheduleSave()}}

function returnToBank(sid){const t=state.tasks.find(t=>t.id===sid);if(!t)return;const lt=state.lifeTasks.find(l=>l.id===t.lifeSourceId);if(lt)lt.inBank=true;state.tasks=state.tasks.filter(t=>t.id!==sid);render();scheduleSave()}
function completeLifeChip(sid){const t=state.tasks.find(t=>t.id===sid);if(!t)return;t.done=true;const lt=state.lifeTasks.find(l=>l.id===t.lifeSourceId);if(lt)lt.done=true;render();scheduleSave()}
function removeLifeChip(sid){const t=state.tasks.find(t=>t.id===sid);if(!t)return;const lt=state.lifeTasks.find(l=>l.id===t.lifeSourceId);if(lt){lt.inBank=false;lt.done=false}state.tasks=state.tasks.filter(t=>t.id!==sid);render();scheduleSave()}
function toggleTaskDone(id){const t=state.tasks.find(t=>t.id===id);if(!t)return;t.done=!t.done;if(t.lifeSourceId){const lt=state.lifeTasks.find(l=>l.id===t.lifeSourceId);if(lt)lt.done=t.done}render();scheduleSave()}
function duplicateTask(id){const t=state.tasks.find(t=>t.id===id);if(!t)return;const dup={...t,id:Date.now()+Math.floor(Math.random()*1000),done:false,lifeSourceId:null};state.tasks.push(dup);render();scheduleSave()}
function cycleMsStatus(cat,idx){const it=state.milestones[cat].items[idx];if(it.status===''||it.status==='tbd')it.status='active';else if(it.status==='active')it.status='done';else it.status='';render();scheduleSave()}

// Add task modal
function openAddTask(date){addingDate=date;$('#aName').value='';$('#aHrs').value='1';$('#aCat').value='bh';$('#aPri').value='normal';$('#addModal').classList.add('open')}
$('#aSave').onclick=()=>{const name=$('#aName').value.trim();if(!name){$('#addModal').classList.remove('open');return}state.tasks.push({id:state.nextId++,date:addingDate,cat:$('#aCat').value,name,hours:parseFloat($('#aHrs').value)||0,priority:$('#aPri').value,done:false,lifeSourceId:null});$('#addModal').classList.remove('open');render();scheduleSave()}
$('#aCanc').onclick=()=>{$('#addModal').classList.remove('open')}
$('#addModal').onclick=e=>{if(e.target.id==='addModal')$('#addModal').classList.remove('open')}

let editTId=null;
function openTaskEdit(id){editTId=id;const t=state.tasks.find(t=>t.id===id);if(!t)return;$('#mTitle').textContent='Edit Task';$('#mName').value=t.name;$('#mHrs').value=t.hours;$('#mCat').value=t.cat;$('#mPri').value=t.priority;$('#editModal').classList.add('open')}
$('#mSave').onclick=()=>{const t=state.tasks.find(t=>t.id===editTId);if(t){t.name=$('#mName').value;t.hours=parseFloat($('#mHrs').value)||0;t.cat=$('#mCat').value;t.priority=$('#mPri').value}$('#editModal').classList.remove('open');render();scheduleSave()}
$('#mDel').onclick=()=>{state.tasks=state.tasks.filter(t=>t.id!==editTId);$('#editModal').classList.remove('open');render();scheduleSave()}
$('#mCanc').onclick=()=>{$('#editModal').classList.remove('open')}
$('#editModal').onclick=e=>{if(e.target.id==='editModal')$('#editModal').classList.remove('open')}

let editLId=null;
function openLifeEdit(id){editLId=id;const t=state.lifeTasks.find(t=>t.id===id);if(!t)return;$('#lName').value=t.name;$('#lHrs').value=t.hours;$('#lCat').value=t.category||'General';$('#lPri').value=t.priority||'med';$('#lDue').value=t.due||'';$('#lifeModal').classList.add('open')}
$('#lSave').onclick=()=>{const t=state.lifeTasks.find(t=>t.id===editLId);if(t){t.name=$('#lName').value;t.hours=parseFloat($('#lHrs').value)||0;t.category=$('#lCat').value;t.priority=$('#lPri').value;t.due=$('#lDue').value}$('#lifeModal').classList.remove('open');render();scheduleSave()}
$('#lDel').onclick=()=>{state.lifeTasks=state.lifeTasks.filter(t=>t.id!==editLId);state.tasks=state.tasks.filter(t=>t.lifeSourceId!==editLId);$('#lifeModal').classList.remove('open');render();scheduleSave()}
$('#lCanc').onclick=()=>{$('#lifeModal').classList.remove('open')}
$('#lifeModal').onclick=e=>{if(e.target.id==='lifeModal')$('#lifeModal').classList.remove('open')}

function addLifeTask(){const name=$('#lifeNewName').value.trim();if(!name)return;state.lifeTasks.push({id:state.nextId++,name,hours:parseFloat($('#lifeNewHrs').value)||1,category:$('#lifeNewCat').value,priority:$('#lifeNewPri').value,due:$('#lifeNewDue').value||'',done:false,inBank:false});$('#lifeNewName').value='';$('#lifeNewHrs').value='';$('#lifeNewDue').value='';render();scheduleSave()}
function toggleLifeDone(id){const t=state.lifeTasks.find(t=>t.id===id);if(!t)return;t.done=!t.done;if(t.done)t.inBank=false;const st=state.tasks.find(s=>s.lifeSourceId===id);if(st)st.done=t.done;render();scheduleSave()}
function deleteLifeTask(id){if(!confirm('Delete?'))return;state.lifeTasks=state.lifeTasks.filter(t=>t.id!==id);state.tasks=state.tasks.filter(t=>t.lifeSourceId!==id);render();scheduleSave()}



// ===== EXPORT / IMPORT =====
function exportState(){
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'planner-backup-' + isoDate(new Date()) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importState(){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    try {
      const text = await file.text();
      const imported = JSON.parse(text);
      if(imported.tasks && imported.lifeTasks){
        state = {...state, ...imported};
        render();
        scheduleSave();
        alert('Backup restored successfully!');
      } else {
        alert('Invalid backup file.');
      }
    } catch(err){
      alert('Error reading file: ' + err.message);
    }
  };
  input.click();
}
async function init(){await loadState();render()}
init();
</script>
