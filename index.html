[data-theme="temple"]{--bg:#c0c0c0;--surface:#ffffff;--surface2:#c0c0c0;--surface3:#a0a0a0;--border:#000000;--text:#000000;--text-dim:#000080;--text-muted:#808080;--accent-bh:#808000;--accent-bh-dim:rgba(128,128,0,.2);--accent-wh:#008000;--accent-wh-dim:rgba(0,128,0,.2);--accent-cn:#800000;--accent-cn-dim:rgba(128,0,0,.2);--accent-ab:#000080;--accent-ab-dim:rgba(0,0,128,.2);--accent-life:#800080;--accent-life-dim:rgba(128,0,128,.2);--danger:#ff0000;--danger-dim:rgba(255,0,0,.15);--warning:#808000;--warning-dim:rgba(128,128,0,.15);--ok:#008000;--ok-dim:rgba(0,128,0,.15)}
[data-theme="temple"] *{font-family:'Courier New',Courier,monospace!important;border-radius:0!important;letter-spacing:0!important;text-transform:none!important}
[data-theme="temple"] .header h1{font-family:'Courier New',Courier,monospace!important;font-size:1.4rem;text-transform:uppercase!important}
[data-theme="temple"] .chip,[data-theme="temple"] .bank-chip{border:2px solid #000!important;font-weight:700}
[data-theme="temple"] .tab{border:2px solid #000!important}
[data-theme="temple"] .tab.active{background:#000080!important;color:#ffff00!important}
[data-theme="temple"] .day-row,[data-theme="temple"] .life-item,[data-theme="temple"] .ms-item{border:1px solid #000!important}
[data-theme="temple"] .notes-box{border:2px solid #000!important}
[data-theme="temple"] .week-badge.current{background:#ffff00!important;color:#000!important;border:2px solid #000!important}
[data-theme="temple"] .week-badge.break{background:#00ff00!important;color:#000!important;border:2px solid #000!important}

[data-theme="temple"] .task-bank{border:2px solid #800080!important}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;transition:background .3s,color .3s}
.app{max-width:900px;margin:0 auto;padding:28px 16px 80px}
.header{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.header h1{font-family:'Crimson Pro',serif;font-size:1.6rem;font-weight:600;letter-spacing:-.02em}
.today-badge{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text-dim);background:var(--surface2);padding:3px 9px;border-radius:16px}
.combined-status{font-family:'JetBrains Mono',monospace;font-size:.65rem;display:inline-flex;align-items:center;gap:5px;min-width:90px;transition:color .3s}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .3s}
.combined-status.saved-online{color:var(--ok)}.combined-status.saved-online .status-dot{background:var(--ok)}
.combined-status.saving{color:var(--warning)}.combined-status.saving .status-dot{background:var(--warning);animation:pulse .8s infinite alternate}
.combined-status.syncing{color:var(--warning)}.combined-status.syncing .status-dot{background:var(--warning);animation:pulse .8s infinite alternate}
.combined-status.offline{color:var(--text-muted)}.combined-status.offline .status-dot{background:var(--danger)}
.combined-status.error{color:var(--danger)}.combined-status.error .status-dot{background:var(--danger)}
@keyframes pulse{from{opacity:.4}to{opacity:1}}
.theme-toggle{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:5px 11px;border-radius:16px;cursor:pointer;font-family:'Outfit';font-size:.75rem;font-weight:500}
.theme-toggle:hover{color:var(--text);border-color:var(--text-dim)}
.settings-wrap{position:relative;display:inline-block}
.settings-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:5px 9px;border-radius:16px;cursor:pointer;font-size:.8rem;line-height:1}
.settings-btn:hover{color:var(--text);border-color:var(--text-dim)}
.settings-menu{display:none;position:absolute;top:calc(100% + 4px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px 0;z-index:50;min-width:120px;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.settings-menu.open{display:block}
.settings-menu button{display:block;width:100%;text-align:left;background:0;border:0;color:var(--text-dim);font-family:'Outfit';font-size:.76rem;padding:7px 14px;cursor:pointer}
.settings-menu button:hover{background:var(--surface2);color:var(--text)}
.version-label{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text-muted);white-space:nowrap}
.subtitle{color:var(--text-dim);font-size:.78rem;margin-bottom:22px}
.tabs{display:flex;gap:2px;margin-bottom:22px;background:var(--surface);border-radius:9px;padding:3px;width:fit-content;border:1px solid var(--border);flex-wrap:wrap}
.tab{padding:7px 14px;border:none;background:0;color:var(--text-dim);font-family:'Outfit';font-size:.78rem;font-weight:600;cursor:pointer;border-radius:6px;transition:all .2s}
.tab:hover{color:var(--text)}.tab.active{background:var(--surface3);color:var(--text)}
.view{display:none}.view.active{display:block}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;width:fit-content;max-width:100%}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.78rem;font-weight:600;color:var(--text-dim)}
.legend-dot{width:10px;height:10px;border-radius:3px}
.legend-dot.bh{background:var(--accent-bh)}.legend-dot.wh{background:var(--accent-wh)}.legend-dot.cn{background:var(--accent-cn)}.legend-dot.ab{background:var(--accent-ab)}.legend-dot.life{background:var(--accent-life)}.legend-dot.events{background:var(--warning)}
.hide-day-btn{font-size:.6rem;padding:1px 5px;border:1px solid var(--border);border-radius:4px;background:var(--surface2);color:var(--text-muted);cursor:pointer;margin-top:2px;opacity:.5;transition:opacity .12s}.hide-day-btn:hover{opacity:1}
.expand-week-btn{font-size:.6rem;padding:1px 6px;border:1px solid var(--border);border-radius:4px;background:var(--surface2);color:var(--text-muted);cursor:pointer;margin-left:8px;opacity:.6;transition:opacity .12s}.expand-week-btn:hover{opacity:1}
.legend-hint{font-size:.72rem;color:var(--text-muted);font-style:italic}

/* Dashboard */
.dash-table{display:grid;gap:10px;margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.dash-col-hdrs,.dash-grid-row{display:grid;gap:8px;padding:0 4px}
.dash-col-hdr{font-family:'Crimson Pro',serif;font-size:.9rem;font-weight:600;text-align:center;padding:8px 4px;border-bottom:2px solid;border-radius:6px 6px 0 0;min-width:130px}
.dash-col-hdr.bh{border-color:var(--accent-bh);color:var(--accent-bh)}.dash-col-hdr.wh{border-color:var(--accent-wh);color:var(--accent-wh)}.dash-col-hdr.cn{border-color:var(--accent-cn);color:var(--accent-cn)}.dash-col-hdr.ab{border-color:var(--accent-ab);color:var(--accent-ab)}
.dash-cell{background:var(--surface);border-radius:7px;padding:10px 12px;text-align:center;border:1px solid var(--border);min-height:60px;min-width:130px;display:flex;flex-direction:column;justify-content:center}
.dc-title{font-family:'Crimson Pro',serif;font-size:.88rem;font-weight:600;margin-bottom:4px;word-wrap:break-word;overflow-wrap:break-word}
.dash-cell-empty{background:0;border:1px dashed var(--border);opacity:.3}
.dc-due{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text-dim)}
.dc-days{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600;margin-top:2px}
.dc-days.urgent{color:var(--danger)}.dc-days.soon{color:var(--warning)}.dc-days.ok{color:var(--ok)}.dc-days.past{color:var(--text-muted);text-decoration:line-through}
.dash-past{opacity:.4}
.dash-cell{position:relative}.dash-cell .dc-close{display:none;position:absolute;top:4px;right:4px;background:var(--surface3);border:1px solid var(--border);color:var(--text-muted);width:20px;height:20px;border-radius:50%;font-size:.65rem;cursor:pointer;align-items:center;justify-content:center;line-height:1;z-index:5;transition:all .12s}.dash-cell .dc-close:hover{background:var(--danger-dim);color:var(--danger);border-color:var(--danger)}.dash-cell.dc-active .dc-close{display:flex}
.dc-tag{display:inline-block;font-size:.58rem;font-weight:700;text-transform:uppercase;padding:1px 5px;border-radius:3px;margin-top:4px}
.notes-box{background:var(--surface);border-radius:9px;padding:14px 18px;margin-bottom:20px;border:1px solid var(--border)}
.notes-box-title{font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);margin-bottom:6px}
.notes-box-text{font-size:.8rem;color:var(--text-dim);line-height:1.7}
.notes-box-text strong{color:var(--text)}

/* Sprint */
.week-section{margin-bottom:26px}
.week-hdr{display:flex;align-items:baseline;gap:9px;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.week-hdr-title{font-family:'Crimson Pro',serif;font-size:1.15rem;font-weight:600}
.week-hdr-dates{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text-dim)}
.week-hdr-hours{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text-muted);margin-left:auto}
.week-badge{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:4px}
.week-badge.current{color:var(--warning);background:var(--warning-dim)}.week-badge.break{color:var(--ok);background:var(--ok-dim)}

.task-bank{background:var(--surface);border:1px solid var(--accent-life);border-radius:8px;padding:10px 14px;margin-bottom:14px}
.task-bank-title{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--accent-life);margin-bottom:8px}
.bank-items{display:flex;flex-wrap:wrap;gap:6px}
.bank-chip{font-size:.78rem;padding:9px 11px;border-radius:10px;font-weight:500;line-height:1.3;display:inline-flex;align-items:center;gap:6px;background:var(--accent-life-dim);color:var(--accent-life);border:1px solid transparent}
.bank-chip.allocating{border:1px solid var(--accent-life);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.bank-btn{width:24px;height:24px;border-radius:50%;border:none;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--surface3);color:var(--text-dim);transition:all .12s;flex-shrink:0}
.bank-btn:hover{color:var(--text);background:var(--border)}
.bank-btn.alloc{background:var(--accent-life-dim);color:var(--accent-life)}.bank-btn.alloc:hover{background:var(--accent-life);color:#fff}
.bank-btn.done-btn{background:var(--ok-dim);color:var(--ok)}.bank-btn.done-btn:hover{background:var(--ok);color:#fff}
.bank-btn.remove-btn:hover{background:var(--danger-dim);color:var(--danger)}
.bank-empty{font-size:.74rem;color:var(--text-muted);font-style:italic}

.day-row{display:grid;grid-template-columns:78px 1fr auto;gap:8px;margin-bottom:5px;padding:8px 10px;background:var(--surface);border-radius:7px;min-height:42px;border:2px solid transparent;transition:all .15s;cursor:default}
.day-row.alloc-target{cursor:pointer}.day-row.alloc-target:hover{border-color:var(--accent-life);background:var(--surface2)}
.day-row.alloc-highlight{border-color:var(--accent-life);background:var(--surface2)}
.day-row.is-today{border-left:3px solid var(--warning)}
.day-left{display:flex;flex-direction:column;gap:1px}
.day-name{font-weight:600;font-size:.8rem}
.day-meta{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--text-dim)}
.day-right{display:flex;align-items:center;gap:6px;min-width:70px;justify-content:flex-end}
.day-budget{font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:600;white-space:nowrap}
.day-budget.over{color:var(--danger)}.day-budget.under{color:var(--ok)}.day-budget.exact{color:var(--text-dim)}

/* Round + add button */
.add-day-btn{width:26px;height:26px;border-radius:50%;border:1px dashed var(--border);background:0;color:var(--text-muted);font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.add-day-btn:hover{color:var(--text-dim);border-color:var(--text-muted);background:var(--surface2)}

.day-tasks-area{display:flex;flex-wrap:wrap;gap:5px;min-height:28px;align-content:flex-start}

.chip{font-size:.78rem;padding:9px 11px;border-radius:10px;font-weight:500;line-height:1.3;display:inline-flex;align-items:center;gap:5px;cursor:grab;position:relative;max-width:100%;transition:opacity .15s,transform .15s;user-select:none}
.chip:active{cursor:grabbing}.chip.dragging{opacity:.3;transform:scale(.95)}
.chip.bh{background:var(--accent-bh-dim);color:var(--accent-bh)}.chip.wh{background:var(--accent-wh-dim);color:var(--accent-wh)}.chip.cn{background:var(--accent-cn-dim);color:var(--accent-cn)}.chip.ab{background:var(--accent-ab-dim);color:var(--accent-ab)}.chip.life{background:var(--accent-life-dim);color:var(--accent-life)}.chip.events{background:var(--warning-dim);color:var(--warning)}
.chip.high{border:1px solid;font-weight:700}.chip.done{opacity:.35;text-decoration:line-through}
.chip[data-tip]::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);padding:3px 8px;background:var(--text);color:var(--bg);font-size:.65rem;font-weight:600;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:20}
.chip[data-tip]:hover::after{opacity:1}
.chip-acts{display:none;position:absolute;top:-5px;right:-5px;gap:2px;z-index:10}
.chip:hover .chip-acts,.chip.menu-open .chip-acts{display:flex}
.chip.menu-activating .chip-acts{pointer-events:none}
.chip-btn{width:20px;height:20px;border-radius:50%;border:none;font-size:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--text);color:var(--bg);transition:all .12s;opacity:.85}
.chip-btn:hover{opacity:1}
.chip-btn.life-return{background:var(--accent-life);color:#fff}
.chip-btn.life-complete{background:var(--ok);color:#fff}
.chip-btn.life-remove{background:var(--danger-dim);color:var(--danger)}.chip-btn.life-remove:hover{background:var(--danger);color:#fff}
.chip.drop-before{box-shadow:-3px 0 0 0 var(--accent-bh)}.chip.drop-after{box-shadow:3px 0 0 0 var(--accent-bh)}

.day-note-row{grid-column:1/-1;margin-top:1px}
.day-note-btn{font-size:.64rem;color:var(--text-muted);cursor:pointer;background:0;border:0;font-family:'Outfit';padding:1px 0}.day-note-btn:hover{color:var(--text-dim)}
.day-note-input{width:100%;margin-top:3px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Outfit';font-size:.76rem;padding:5px 9px;border-radius:5px;resize:vertical;min-height:28px}
.day-note-input:focus{outline:0;border-color:var(--text-dim)}

/* Life Tasks */
.life-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.life-title{font-family:'Crimson Pro',serif;font-size:1.15rem;font-weight:600}
.life-add-form{display:flex;gap:5px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.life-input{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Outfit';font-size:.78rem;padding:7px 10px;border-radius:6px}
.life-input:focus{outline:0;border-color:var(--text-dim)}.life-input::placeholder{color:var(--text-muted)}
.life-select{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Outfit';font-size:.74rem;padding:6px 8px;border-radius:5px}
.life-btn{background:var(--surface3);border:1px solid var(--border);color:var(--text-dim);font-size:.74rem;font-weight:600;padding:6px 12px;border-radius:5px;cursor:pointer;font-family:'Outfit'}.life-btn:hover{color:var(--text);border-color:var(--text-dim)}
.life-cat-group{margin-bottom:16px}
.life-cat-hdr{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.life-item{display:grid;grid-template-columns:auto 1fr auto auto auto auto auto;gap:6px;align-items:center;padding:9px 12px;background:var(--surface);border-radius:8px;border-left:3px solid var(--accent-life);margin-bottom:5px;min-height:44px}
.life-item.done-item{opacity:.4}.life-item.done-item .li-name{text-decoration:line-through}
.li-check{width:20px;height:20px;border-radius:4px;border:2px solid var(--border);background:0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ok);font-size:.7rem;transition:all .12s;flex-shrink:0}
.li-check:hover{border-color:var(--ok)}.li-check.checked{background:var(--ok-dim);border-color:var(--ok)}
.li-name{font-size:.84rem;font-weight:500}
.li-meta{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text-dim)}
.li-days{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:600}
.li-days.urgent{color:var(--danger)}.li-days.soon{color:var(--warning)}.li-days.ok{color:var(--ok)}
.li-pri{font-size:.62rem;font-weight:700;text-transform:uppercase;padding:2px 6px;border-radius:3px}
.li-pri.high{background:var(--danger-dim);color:var(--danger)}.li-pri.med{background:var(--warning-dim);color:var(--warning)}.li-pri.low{background:var(--surface3);color:var(--text-muted)}
.li-send{width:28px;height:28px;border-radius:50%;border:1px solid var(--accent-life);background:var(--accent-life-dim);color:var(--accent-life);font-size:.72rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;position:relative}
.li-send:hover{background:var(--accent-life);color:#fff}
.li-send.in-sprint{background:var(--surface3);border-color:var(--text-muted);color:var(--text-muted)}.li-send.in-sprint:hover{background:var(--warning-dim);color:var(--warning);border-color:var(--warning)}
.li-send[data-tip]::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);padding:3px 8px;background:var(--text);color:var(--bg);font-size:.62rem;font-weight:600;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .12s;z-index:20}
.li-send[data-tip]:hover::after{opacity:1}
.li-btns{display:flex;gap:3px}
.li-btn{background:0;border:0;color:var(--text-muted);cursor:pointer;font-size:.76rem;padding:2px 5px;border-radius:3px;transition:all .12s}
.li-btn:hover{color:var(--text-dim);background:var(--surface3)}
.li-btn.del:hover{color:var(--danger);background:var(--danger-dim)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:22px;width:340px;max-width:90vw}
.modal h3{font-family:'Crimson Pro',serif;font-size:1.05rem;margin-bottom:12px}
.modal label{display:block;font-size:.72rem;font-weight:600;color:var(--text-dim);margin-bottom:3px;margin-top:8px}
.modal input,.modal select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Outfit';font-size:.8rem;padding:6px 9px;border-radius:5px}
.modal input:focus,.modal select:focus{outline:0;border-color:var(--text-dim)}
.modal-btns{display:flex;gap:7px;margin-top:14px;justify-content:flex-end}
.mbtn{padding:6px 14px;border-radius:5px;border:1px solid var(--border);font-family:'Outfit';font-size:.78rem;font-weight:600;cursor:pointer;transition:all .12s}
.mbtn.primary{background:var(--surface3);color:var(--text);border-color:var(--text-dim)}.mbtn.primary:hover{background:var(--border)}
.mbtn.secondary{background:0;color:var(--text-dim)}.mbtn.secondary:hover{color:var(--text)}
.mbtn.danger{background:var(--danger-dim);color:var(--danger);border-color:var(--danger)}.mbtn.danger:hover{background:var(--danger);color:#fff}
.hrs-stepper{display:flex;align-items:center;gap:0}
.hrs-stepper input{text-align:center;border-radius:0;border-left:0;border-right:0;-moz-appearance:textfield}
.hrs-stepper input::-webkit-outer-spin-button,.hrs-stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.step-btn{width:34px;height:34px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s}
.step-btn:first-child{border-radius:5px 0 0 5px}.step-btn:last-child{border-radius:0 5px 5px 0}
.step-btn:hover{background:var(--surface3)}
.pri-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:20px;overflow:hidden;cursor:pointer;user-select:none;width:100%}
.pri-toggle .pri-option{padding:7px 16px;font-size:.78rem;font-weight:600;font-family:'Outfit';transition:all .15s;color:var(--text-muted);flex:1;text-align:center}
.pri-toggle .pri-option.active{background:var(--surface3);color:var(--text);border-radius:20px}
.pri-toggle.high .pri-option:last-child{background:var(--danger-dim);color:var(--danger);border-radius:20px}
.pri-toggle.high .pri-option:first-child{color:var(--text-muted)}

/* Notes */
.note-entry{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;position:relative}
.note-preview{font-size:.82rem;color:var(--text);line-height:1.7;padding:6px 2px;white-space:pre-wrap;word-break:break-word;cursor:text}
.note-preview ul{margin:0 0 0 1.2em;padding:0;list-style:disc}
.note-preview li{margin:0}
.note-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.note-move{background:0;border:1px solid var(--border);color:var(--text-muted);cursor:pointer;font-size:.68rem;padding:2px 6px;border-radius:4px;transition:all .12s;line-height:1}
.note-move:hover{color:var(--text);background:var(--surface2);border-color:var(--text-dim)}
.note-move:disabled{opacity:.2;cursor:default}
.note-ts{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--text-dim)}
.note-label{font-size:.58rem;color:var(--text-muted);font-style:italic}
.note-del{background:0;border:0;color:var(--text-muted);cursor:pointer;font-size:.7rem;margin-left:auto;padding:2px 6px;border-radius:3px;transition:all .12s}
.note-del:hover{color:var(--danger);background:var(--danger-dim)}
.note-title-input{background:0;border:0;border-bottom:1px solid transparent;color:var(--text);font-family:'Crimson Pro',serif;font-size:.92rem;font-weight:600;padding:0 2px 1px;flex:1;min-width:60px;outline:0;transition:border-color .12s}
.note-title-input:focus{border-bottom-color:var(--text-dim)}
.note-title-input::placeholder{color:var(--text-muted);font-weight:400}
.note-body{position:relative}
.note-text{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Outfit';font-size:.82rem;padding:8px 10px;border-radius:6px;resize:vertical;min-height:50px;line-height:1.6}
.note-text:focus{outline:0;border-color:var(--text-dim)}
.note-resize-btns{position:absolute;bottom:6px;right:6px;display:flex;gap:2px}
.note-resize-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;font-size:.62rem;padding:2px 5px;border-radius:3px;opacity:.5;transition:all .12s;line-height:1}
.note-resize-btn:hover{opacity:1;color:var(--text-dim);background:var(--surface3)}

/* Events */
.evt-list{margin-bottom:16px}
.evt-item{display:grid;grid-template-columns:90px 1fr auto auto;gap:8px;align-items:center;padding:10px 12px;background:var(--surface);border-radius:8px;border-left:3px solid var(--warning);margin-bottom:5px}
.evt-item.past-evt{opacity:.4}
.evt-date{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text-dim)}
.evt-info{display:flex;flex-direction:column;gap:2px}
.evt-name{font-size:.84rem;font-weight:600}
.evt-loc{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text-muted);font-style:italic}
.evt-meta{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text-dim)}
.evt-btns{display:flex;gap:3px}
.evt-btn{background:0;border:0;color:var(--text-muted);cursor:pointer;font-size:.76rem;padding:2px 5px;border-radius:3px;transition:all .12s}
.evt-btn:hover{color:var(--text-dim);background:var(--surface3)}
.evt-btn.del:hover{color:var(--danger);background:var(--danger-dim)}
.parsed-evt{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:8px}
.parsed-evt.needs-date{border-color:var(--danger)}
.parsed-evt .needs-date-flag{color:var(--danger);font-size:.7rem;font-weight:600}
.parsed-evt{position:relative}
.parsed-evt-del{position:absolute;top:6px;right:6px;background:0;border:0;color:var(--text-muted);cursor:pointer;font-size:.72rem;padding:2px 5px;border-radius:3px;transition:all .12s;z-index:1}
.parsed-evt-del:hover{color:var(--danger);background:var(--danger-dim)}
.parsed-evt input{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Outfit';font-size:.76rem;padding:5px 8px;border-radius:5px;width:100%}
.parsed-evt input:focus{outline:0;border-color:var(--text-dim)}
.parsed-evt-grid{display:grid;grid-template-columns:1fr 110px 90px 90px 1fr;gap:6px;align-items:end}
.parsed-evt-label{font-size:.6rem;color:var(--text-muted);text-transform:uppercase;font-weight:600}
@media(max-width:700px){.parsed-evt-grid{grid-template-columns:1fr 1fr;gap:4px}}
.evt-add-form{display:flex;gap:5px;align-items:flex-end;margin-bottom:18px;flex-wrap:wrap}
.evt-add-form input,.evt-add-form select{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Outfit';font-size:.78rem;padding:7px 10px;border-radius:6px}
.evt-add-form input:focus{outline:0;border-color:var(--text-dim)}
.labeled-field{display:flex;flex-direction:column;gap:1px}
.labeled-field label{font-size:.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}

/* Event chips in sprint */
.evt-chip{font-size:.72rem;padding:6px 10px;border-radius:10px;font-weight:500;line-height:1.3;display:inline-flex;align-items:center;gap:4px;background:var(--warning-dim);color:var(--warning);border:1px dashed var(--warning);cursor:default;position:relative;user-select:none}
.evt-chip[draggable="true"]{cursor:grab}
.evt-chip.dragging{opacity:.4}
.evt-chip.evt-past{opacity:.35;text-decoration:line-through}
.evt-chip .chip-acts{display:none;position:absolute;top:-5px;right:-5px;gap:2px;z-index:10}
.evt-chip:hover .chip-acts,.evt-chip.menu-open .chip-acts{display:flex}
.evt-chip.menu-activating .chip-acts{pointer-events:none}
.evt-chip[data-tip]::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);padding:3px 8px;background:var(--text);color:var(--bg);font-size:.62rem;font-weight:600;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:20}
.evt-chip[data-tip]:hover::after{opacity:1}

/* Task drag in Tasks tab */
.life-cat-hdr{cursor:grab;user-select:none}
.life-cat-hdr.drag-over{border-bottom:2px solid var(--warning)}
.life-item{cursor:grab}
.life-item.dragging{opacity:.3}
.life-item.drag-over-item{box-shadow:0 -2px 0 0 var(--warning)}

/* Syllabus */
.syl-week-section{margin-bottom:24px}
.syl-week-hdr{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;padding-bottom:4px;border-bottom:1px solid var(--border);margin-bottom:8px;display:flex;align-items:baseline;gap:8px}
.syl-week-dates{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text-dim)}
.syl-table{width:100%;border-collapse:collapse;margin-bottom:8px}
.syl-table td{padding:8px 8px;vertical-align:top;font-size:.82rem}
.syl-table tr{border-bottom:1px solid var(--border)}
.syl-table tr.done td{opacity:.4}
.syl-table tr.done .syl-title-text{text-decoration:line-through}
.syl-class-cell{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;width:44px}
.syl-dot{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
.syl-due-cell{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text-dim);width:64px;max-width:72px}
.syl-due-dow{display:block;font-size:.6rem;color:var(--text-muted);font-weight:400}
.syl-due-cell .syl-days{display:block;font-size:.64rem;font-weight:600}
.syl-days.urgent{color:var(--danger)}.syl-days.soon{color:var(--warning)}.syl-days.ok{color:var(--ok)}.syl-days.past{color:var(--text-muted)}
.syl-title-text{font-weight:500}
.syl-type-tag{font-size:.56rem;font-weight:700;text-transform:uppercase;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle;display:inline-block}
.syl-type-tag.reading{background:var(--surface3);color:var(--text-dim)}.syl-type-tag.paper{background:var(--danger-dim);color:var(--danger)}.syl-type-tag.exam{background:var(--warning-dim);color:var(--warning)}.syl-type-tag.presentation{background:var(--accent-ab-dim);color:var(--accent-ab)}.syl-type-tag.custom{background:var(--surface3);color:var(--text-muted)}
.syl-hrs-cell{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text-muted);width:36px;text-align:right}
.syl-detail-text{font-size:.76rem;color:var(--text-dim);margin-top:4px;line-height:1.6}
.syl-detail-edit{width:100%;margin-top:4px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Outfit';font-size:.76rem;padding:5px 8px;border-radius:4px;resize:vertical;min-height:28px;line-height:1.5}
.syl-detail-edit:focus{outline:0;border-color:var(--text-dim)}
.syl-title-edit{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Outfit';font-size:.82rem;padding:2px 6px;border-radius:4px;width:100%}
.syl-title-edit:focus{outline:0;border-color:var(--text-dim)}
.syl-check{width:16px;height:16px;border-radius:3px;border:2px solid var(--border);background:0;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--ok);font-size:.6rem;transition:all .12s;flex-shrink:0;vertical-align:middle}
.syl-check:hover{border-color:var(--ok)}.syl-check.checked{background:var(--ok-dim);border-color:var(--ok)}
.syl-btns-cell{width:44px;white-space:nowrap}
.syl-btn{background:0;border:0;color:var(--text-muted);cursor:pointer;font-size:.68rem;padding:1px 4px;border-radius:3px;transition:all .12s;opacity:.4}
.syl-btn:hover{opacity:1;color:var(--text-dim);background:var(--surface3)}.syl-btn.del:hover{color:var(--danger);background:var(--danger-dim)}
.syl-add-form{display:flex;gap:5px;align-items:flex-end;margin-bottom:18px;flex-wrap:wrap}
.syl-add-form input,.syl-add-form select{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Outfit';font-size:.78rem;padding:7px 10px;border-radius:6px}
.syl-hl-btn{background:0;border:0;cursor:pointer;font-size:.7rem;padding:1px 3px;border-radius:3px;opacity:.3;transition:all .12s;line-height:1}
.syl-hl-btn:hover{opacity:.7}.syl-hl-btn.on{opacity:1}
.syl-row-hl{background:var(--warning-dim)}
.syl-bullet{display:block;padding-left:14px;position:relative}.syl-bullet::before{content:'•';position:absolute;left:4px}
.syl-sub-bullet{display:block;padding-left:28px;position:relative;font-size:.72rem}.syl-sub-bullet::before{content:'◦';position:absolute;left:16px}
.chip.syl-mirror{cursor:default;opacity:.75;font-size:.72rem;padding:5px 9px;border:1px dashed}
.chip.syl-mirror .chip-acts{display:none!important}
@keyframes halo-breathe{0%,100%{box-shadow:0 0 4px 1px var(--halo-color)}50%{box-shadow:0 0 8px 3px var(--halo-color)}}
.chip.task-halo{--halo-color:rgba(201,162,39,.5);border-left:3px solid #c9a227;animation:halo-breathe 3s ease-in-out infinite}
.settings-section{margin-bottom:18px}
.settings-section label{display:block;font-size:.78rem;font-weight:600;color:var(--text-dim);margin:10px 0 4px}
.cal-pick-btn{background:var(--surface2);border:1px solid var(--border);border-left:0;border-radius:0 6px 6px 0;cursor:pointer;font-size:.72rem;padding:4px 6px;color:var(--text-dim);transition:all .12s;line-height:1}

function renderEvtItem(e,isPast){

const multi=e.endDate&&e.endDate!==e.date;
const dateStr=multi?fmtDate(parseDate(e.date))+' → '+fmtDate(parseDate(e.endDate)):fmtDate(parseDate(e.date));
const timeStr=e.allDay?'All day':(e.startTime?fmtT(e.startTime)+(e.endTime?'–'+fmtT(e.endTime):''):'');
const hue=evtHue(e.id);const hueStyle=hue?` style="filter:hue-rotate(${hue}deg)"`:'';

const EVT_HUES=[0,45,90,150,210,270,330];
let _evtColorMap=new Map();
function computeEvtColors(){const evts=(state.events||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));const map=new Map();evts.forEach(e=>{const eStart=e.date,eEnd=e.endDate||e.date;const usedColors=new Set();evts.forEach(o=>{if(o.id===e.id)return;const oStart=o.date,oEnd=o.endDate||o.date;if(eStart<=oEnd&&eEnd>=oStart&&map.has(o.id))usedColors.add(map.get(o.id))});let ci=0;while(usedColors.has(ci))ci++;map.set(e.id,ci)});_evtColorMap=map}
function evtHue(id){const ci=_evtColorMap.get(id)||0;return EVT_HUES[ci%EVT_HUES.length]}
function getEventsForDate(dateStr){
const evts=state.events||[];const chips=[];
evts.forEach(e=>{
const start=e.date,end=e.endDate||e.date;
if(dateStr>=start&&dateStr<=end){
const fmtT=t=>{if(!t)return'';const[h,m]=t.split(':');const hr=parseInt(h);return(hr>12?hr-12:hr||12)+':'+m+(hr>=12?'pm':'am')};
let label=e.name;
const isMulti=end!==start;
if(isMulti){const s=parseDate(start),en=parseDate(end),c=parseDate(dateStr);const total=Math.round((en-s)/864e5)+1;const day=Math.round((c-s)/864e5)+1;label+=` (${day}/${total})`}
const tip=[e.allDay?'All day':(e.startTime?fmtT(e.startTime)+(e.endTime?'–'+fmtT(e.endTime):''):''),e.location].filter(Boolean).join(' · ');

chips.push({evtId:e.id,label,tip:tip||e.name,startTime:e.startTime||'',endTime:e.endTime||'',endDate:end,isMulti,isStart,isEnd,draggable:isStart||isEnd,hue:evtHue(e.id)})}});
return chips}

function renderSyllabus(){
const catPri={bh:0,wh:1,ab:2,cn:3,custom:4};
const syl=(state.syllabus||[]).slice().sort((a,b)=>a.due.localeCompare(b.due)||(catPri[a.cat]??9)-(catPri[b.cat]??9));
const done=syl.filter(s=>s.done).length,rem=syl.length-done;
// Group by semester week
const weekMap={};
syl.forEach(s=>{
  const wk=semesterWeekNum(parseDate(s.due));
  if(!weekMap[wk])weekMap[wk]=[];
  weekMap[wk].push(s);
});
const weekNums=Object.keys(weekMap).map(Number).sort((a,b)=>a-b);
let h=`<div class="life-header"><span class="life-title">Syllabus</span><span class="legend-hint">${rem} remaining · ${done} complete</span></div>`;
h+=`<div style="margin-bottom:14px"><button class="life-btn" onclick="toggleEl('sylAddForm')">+ Add Entry</button></div><div id="sylAddForm" style="display:none"><div class="syl-add-form"><input id="sylNewTitle" placeholder="Title" style="flex:2;min-width:120px"/><select id="sylNewCat"><option value="bh">BH</option><option value="wh">WH</option><option value="ab">ABI</option><option value="cn">CH</option><option value="custom">✎ Custom</option></select><select id="sylNewType"><option value="reading">Reading</option><option value="paper">Paper</option><option value="exam">Exam</option><option value="presentation">Presentation</option><option value="custom">Custom</option></select><div class="labeled-field"><label>Due</label><div style="display:flex;gap:0"><input id="sylNewDue" type="text" placeholder="M/D" style="width:80px;border-radius:6px 0 0 6px"/><button class="cal-pick-btn" onclick="openCalPick('sylNewDue')" type="button">📅</button></div></div><button class="life-btn" onclick="addSylEntry()">Add</button></div><div style="margin-bottom:18px;margin-top:-4px"><textarea id="sylNewDetail" placeholder="Description (optional, '- ' for bullets, '+ ' for sub-bullets)" style="width:100%;min-height:36px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Outfit';font-size:.76rem;padding:6px 9px;border-radius:6px;resize:vertical"></textarea></div></div>`;
const curWkN=semesterWeekNum(TODAY);
const todayStr=isoDate(TODAY);
const hiddenSylDays=state.hiddenSylDays||[];
const pastWkNums=weekNums.filter(wkN=>wkN<curWkN);
if(pastWkNums.length){h+=`<div style="margin-bottom:14px"><button class="life-btn" onclick="toggleEl('sylPastWeeks')" style="opacity:.6;font-size:.68rem">${pastWkNums.length} past week${pastWkNums.length>1?'s':''} (show)</button></div><div id="sylPastWeeks" style="display:none">`}
weekNums.forEach(wkN=>{
  const entries=weekMap[wkN];
  const wkStart=semesterWeekStart(wkN);
  const wkEnd=new Date(wkStart);wkEnd.setDate(wkEnd.getDate()+6);
  const isCur=TODAY>=wkStart&&TODAY<=wkEnd;
  const isPast=wkN<curWkN;
  // Filter entries: auto-hide past days in current week, respect hiddenSylDays
  const visibleEntries=isCur?entries.filter(e=>{
    const effDue=e.dueEnd||e.due;
    if(effDue<todayStr)return false;
    if(hiddenSylDays.includes(e.due))return false;
    return true;
  }):entries;
  const hiddenCount=entries.length-visibleEntries.length;
  h+=`<div class="syl-week-section"><div class="syl-week-hdr">Week ${wkN}${isCur?' <span class="week-badge current">This Week</span>':''} <span class="syl-week-dates">${fmtDateShort(wkStart)} → ${fmtDateShort(wkEnd)}</span>${isCur&&hiddenCount?`<button class="expand-week-btn" onclick="expandSylDays(${wkN})" title="Show ${hiddenCount} hidden" style="margin-left:8px;font-size:.66rem;opacity:.6;cursor:pointer;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;color:var(--text-dim)">▼ ${hiddenCount} hidden</button>`:''}</div>`;
  // Sub-group by due+cat for rowspan
  const groups=[];
  visibleEntries.forEach(e=>{
    const key=e.due+'|'+e.cat;
    if(!groups.length||groups[groups.length-1].key!==key)groups.push({key,cat:e.cat,due:e.due,entries:[e]});
    else groups[groups.length-1].entries.push(e);
  });
  h+=`<table class="syl-table"><tbody>`;
  groups.forEach(g=>{
    const isToday=g.due===todayStr;
    g.entries.forEach((e,ei)=>{
      const dueD=parseDate(e.due),dl=daysBetween(TODAY,dueD);
      const dueEndD=e.dueEnd?parseDate(e.dueEnd):null;
      const dueStr=dueEndD?fmtDateShort(dueD)+' → '+fmtDateShort(dueEndD):fmtDateShort(dueD);
      const dlRef=dueEndD?daysBetween(TODAY,dueEndD):dl;
      const urgClass=e.done?'past':(dlRef<0?'past':dlRef<=3?'urgent':dlRef<=7?'soon':'ok');
      const daysStr=e.done?'':(dlRef<0?Math.abs(dlRef)+'d ago':dlRef===0?'today':dlRef+'d');
      const isHl=!!e.highlighted;
      const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const dowStr=DOW[dueD.getDay()];
      const dowEndStr=dueEndD?DOW[dueEndD.getDay()]:'';
      h+=`<tr class="${e.done?'done':''} ${isHl?'syl-row-hl':''}">`;
      h+=`<td style="width:28px"><button class="syl-check ${e.done?'checked':''}" onclick="toggleSylDone(${e.id})">${e.done?'✓':''}</button><br><button class="syl-hl-btn ${isHl?'on':''}" onclick="toggleSylHL(${e.id})" title="Highlight">★</button></td>`;
      if(ei===0){
        const dotStyle=e.cat==='custom'?'background:var(--text-muted)':'background:var(--accent-'+e.cat+')';
        h+=`<td class="syl-class-cell"${g.entries.length>1?' rowspan="'+g.entries.length+'"':''}><span class="syl-dot" style="${dotStyle}"></span>${CAT_SHORT[e.cat]||e.cat}</td>`;
        const dowLabel=dueEndD?dowStr+' → '+dowEndStr:dowStr;
        h+=`<td class="syl-due-cell"${g.entries.length>1?' rowspan="'+g.entries.length+'"':''}>${dueStr}<span class="syl-due-dow">${dowLabel}</span><span class="syl-days ${urgClass}">${daysStr}</span>${isToday&&isCur?`<button class="hide-day-btn" onclick="hideSylDay('${e.due}')" style="margin-top:2px">hide</button>`:''}</td>`;
      }
      const detailHtml=e.detail?e.detail.split('\n').map(line=>line.startsWith('- ')?`<div class="syl-bullet">${line.substring(2)}</div>`:line.startsWith('+ ')?`<div class="syl-sub-bullet">${line.substring(2)}</div>`:`<div>${line}</div>`).join(''):'';
      const showTypeTag=!(e.cat==='custom'&&e.type==='custom')&&e.type;h+=`<td><span class="syl-title-text" ondblclick="inlineSylEdit(${e.id},'title',this)">${e.title}</span>${showTypeTag?`<span class="syl-type-tag ${e.type}">${e.type}</span>`:''} ${detailHtml?`<div class="syl-detail-text" ondblclick="inlineSylEdit(${e.id},'detail',this)">${detailHtml}</div>`:''}</td>`;
      h+=`<td class="syl-btns-cell"><button class="syl-btn" onclick="openSylEdit(${e.id})">✎</button><button class="syl-btn del" onclick="deleteSylEntry(${e.id})">✕</button></td>`;
      h+=`</tr>`;
    });
  });
  h+=`</tbody></table></div>`;
  if(isPast&&wkN===pastWkNums[pastWkNums.length-1])h+='</div>';
});
return h}

function getSylForDate(dateStr){
  const chips=[];
  (state.syllabus||[]).forEach(s=>{
    if(s.done)return;
    const start=s.due,end=s.dueEnd||s.due;
    if(dateStr>=start&&dateStr<=end){
      const startD=parseDate(start),endD=parseDate(end),curD=parseDate(dateStr);
      const total=Math.round((endD-startD)/864e5)+1;
      const day=Math.round((curD-startD)/864e5)+1;
      const label=total>1?` (${day}/${total})`:'';
      chips.push({entry:s,label,cat:s.cat,type:s.type,title:s.title});
    }
  });
  return chips;
}

function normalizeDateInput(val){
  if(!val)return val;
  if(/^\d{4}-\d{2}-\d{2}$/.test(val))return val;
  const m=val.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
  if(m)return new Date().getFullYear()+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');
  const m2=val.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(m2){let y=parseInt(m2[3]);if(y<100)y+=2000;return y+'-'+m2[1].padStart(2,'0')+'-'+m2[2].padStart(2,'0')}
  return val;
}

function openCalPick(targetId){
  let picker=document.getElementById('_calPicker');
  if(!picker){picker=document.createElement('input');picker.type='date';picker.id='_calPicker';picker.style.cssText='position:fixed;opacity:0;pointer-events:none;width:0;height:0;top:0;left:0';document.body.appendChild(picker)}
  const target=document.getElementById(targetId);
  const cur=target?normalizeDateInput(target.value.trim()):'';
  picker.value=cur||isoDate(TODAY);
  picker.onchange=()=>{if(target&&picker.value){target.value=picker.value}};
  picker.showPicker()
}

function parseEventBlock(text){
const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
let combined=lines.join(' ');
let date='',startTime='',endTime='',location='';
const dateResult=extractDate(combined);
if(dateResult.date){date=dateResult.date;combined=dateResult.remaining}
const timeResult=extractTime(combined);
if(timeResult.startTime){startTime=timeResult.startTime;if(timeResult.endTime)endTime=timeResult.endTime;combined=timeResult.remaining}
const locResult=extractLocation(combined,lines);
if(locResult.location){location=locResult.location;combined=locResult.remaining}
let name=combined.replace(/^[\s,\-–—:·]+/,'').replace(/[\s,\-–—:·]+$/,'').replace(/\s{2,}/g,' ').trim();
if(!name&&lines.length)name=lines[0].replace(/^[\s,\-–—:·]+/,'').replace(/[\s,\-–—:·]+$/,'').trim();
return{name,date,startTime,endTime,location,raw:text}
}
function extractDate(text){
const MONTHS={january:0,february:1,march:2,april:3,may:4,june:5,july:6,august:7,september:8,october:9,november:10,december:11,jan:0,feb:1,mar:2,apr:3,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
const DAYS={sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6,sun:0,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6};
const yr=TODAY.getFullYear();
let remaining=text,date='';
const tmrRe=/\b(tomorrow|tmr)\b/i;
const tonightRe=/\btonight\b/i;
if(tmrRe.test(remaining)){const d=new Date(TODAY);d.setDate(d.getDate()+1);date=isoDate(d);remaining=remaining.replace(tmrRe,'').trim();return{date,remaining}}
if(tonightRe.test(remaining)){date=isoDate(TODAY);remaining=remaining.replace(tonightRe,'').trim();return{date,remaining}}
const monthNames=Object.keys(MONTHS).filter(m=>m.length>3).join('|')+'|'+Object.keys(MONTHS).filter(m=>m.length===3).join('|');
const dayNames=Object.keys(DAYS).join('|');
const r1=new RegExp('(?:(?:'+dayNames+')\\s*[,]?\\s*)?('+monthNames+')\\s+(\\d{1,2})(?:st|nd|rd|th)?(?:\\s*[,]\\s*(\\d{4}))?','i');
const m1=remaining.match(r1);
if(m1){const mo=MONTHS[m1[1].toLowerCase()];const da=parseInt(m1[2]);const y=m1[3]?parseInt(m1[3]):yr;date=y+'-'+String(mo+1).padStart(2,'0')+'-'+String(da).padStart(2,'0');remaining=remaining.replace(m1[0],'').trim();return{date,remaining}}
const r2=new RegExp('(?:(?:'+dayNames+')\\s*[,]?\\s*)?(\\d{1,2})/(\\d{1,2})(?:/(\\d{2,4}))?','i');
const m2=remaining.match(r2);
if(m2){const mo=parseInt(m2[1]);const da=parseInt(m2[2]);let y=m2[3]?parseInt(m2[3]):yr;if(y<100)y+=2000;date=y+'-'+String(mo).padStart(2,'0')+'-'+String(da).padStart(2,'0');remaining=remaining.replace(m2[0],'').trim();return{date,remaining}}
const dayRe=new RegExp('\\b('+dayNames+')\\b','i');
const dm=remaining.match(dayRe);
if(dm){const target=DAYS[dm[1].toLowerCase()];const d=new Date(TODAY);const cur=d.getDay();let diff=target-cur;if(diff<=0)diff+=7;d.setDate(d.getDate()+diff);date=isoDate(d);remaining=remaining.replace(dm[0],'').trim();return{date,remaining}}
return{date:'',remaining:text}
}
function extractTime(text){
let remaining=text,startTime='',endTime='';
function toHHMM(h,m,ampm){h=parseInt(h);m=parseInt(m||'0');if(ampm){const a=ampm.toLowerCase();if(a.startsWith('p')&&h<12)h+=12;if(a.startsWith('a')&&h===12)h=0}return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')}
const rangeRe=/(\d{1,2})(?::(\d{2}))?\s*([ap]\.?m\.?)?\s*[-–—to]+\s*(\d{1,2})(?::(\d{2}))?\s*([ap]\.?m\.?)?/i;
const rm=remaining.match(rangeRe);
if(rm){let ap1=rm[3]||'',ap2=rm[6]||'';if(!ap1&&ap2)ap1=ap2;if(ap1)ap1=ap1.replace(/\./g,'')+'m';if(ap2)ap2=ap2.replace(/\./g,'')+'m';if(!ap1&&!ap2){const h=parseInt(rm[1]);ap1=h>=8&&h<=11?'am':'pm';ap2=ap1}startTime=toHHMM(rm[1],rm[2],ap1);endTime=toHHMM(rm[4],rm[5],ap2);remaining=remaining.replace(rm[0],'').trim();return{startTime,endTime,remaining}}
const singleRe=/(?:[@at]*\s*)(\d{1,2})(?::(\d{2}))?\s*([ap]\.?m\.?)/i;
const sm=remaining.match(singleRe);
if(sm){let ap=sm[3].replace(/\./g,'')+'m';startTime=toHHMM(sm[1],sm[2],ap);remaining=remaining.replace(sm[0],'').trim();return{startTime,endTime:'',remaining}}
const atTimeRe=/(?:@|at)\s+(\d{1,2})(?::(\d{2}))?\b/i;
const atm=remaining.match(atTimeRe);
if(atm){const h=parseInt(atm[1]);const ampm=h>=8&&h<=11?'am':'pm';startTime=toHHMM(atm[1],atm[2],ampm);remaining=remaining.replace(atm[0],'').trim();return{startTime,endTime:'',remaining}}
const wordTimeRe=/\b(afternoon|evening)\b/i;
const wm=remaining.match(wordTimeRe);
if(wm){startTime=wm[1].toLowerCase()==='afternoon'?'13:00':'19:00';remaining=remaining.replace(wm[0],'').trim();return{startTime,endTime:'',remaining}}
return{startTime:'',endTime:'',remaining}
}
function extractLocation(text,lines){
let remaining=text,location='';
const atLocRe=/(?:@|(?:^|[,;])\s*at|(?:^|[,;])\s*in)\s+([A-Z][A-Za-z0-9 .''&\-]+?)(?=[,;]|$)/;
const alm=remaining.match(atLocRe);
if(alm){location=alm[1].trim();remaining=remaining.replace(alm[0],'').trim();return{location,remaining}}
const onlineRe=/\b(online|zoom|virtual|teams|webex)\b/i;
const om=remaining.match(onlineRe);
if(om){location=om[1];remaining=remaining.replace(om[0],'').trim();return{location,remaining}}
if(lines.length>1){const last=lines[lines.length-1];if(/^[A-Z][A-Za-z0-9 .''&\-]+$/.test(last)&&last.length<60&&!extractDate(last).date&&!extractTime(last).startTime){location=last;remaining=remaining.replace(last,'').trim();return{location,remaining}}}
return{location:'',remaining}
}
function renderParsedPreview(){const el=$('#evtParsePreview');if(!el)return;if(!_parsedEvents.length){el.innerHTML='';return}let h='';_parsedEvents.forEach((e,i)=>{const nd=!e.date;h+=`<div class="parsed-evt${nd?' needs-date':''}"><button class="parsed-evt-del" onclick="removeParsedEvent(${i})" title="Remove">✕</button><div class="parsed-evt-grid"><div><span class="parsed-evt-label">Name</span><input value="${(e.name||'').replace(/"/g,'&quot;')}" oninput="_parsedEvents[${i}].name=this.value"/></div><div><span class="parsed-evt-label">Date${nd?' <span class="needs-date-flag">needs date</span>':''}</span><input type="date" value="${e.date}" oninput="_parsedEvents[${i}].date=this.value"/></div><div><span class="parsed-evt-label">Start</span><input type="time" value="${e.startTime}" oninput="_parsedEvents[${i}].startTime=this.value"/></div><div><span class="parsed-evt-label">End</span><input type="time" value="${e.endTime}" oninput="_parsedEvents[${i}].endTime=this.value"/></div><div><span class="parsed-evt-label">Location</span><input value="${(e.location||'').replace(/"/g,'&quot;')}" oninput="_parsedEvents[${i}].location=this.value"/></div></div></div>`});h+=`<div style="margin-top:10px"><button class="life-btn" onclick="saveAllParsed()">Save all (${_parsedEvents.length})</button></div>`;el.innerHTML=h}

function saveAllParsed(){if(!_parsedEvents.length)return;if(!state.events)state.events=[];_parsedEvents.forEach(e=>{if(e.name)state.events.push({id:state.nextId++,name:e.name,date:e.date||isoDate(TODAY),endDate:'',startTime:e.startTime||'',endTime:e.endTime||'',location:e.location||'',allDay:false})});_parsedEvents=[];render();scheduleSave()}

function editCatName(el,oldName){el.setAttribute('draggable','false');const count=el.textContent.match(/\((\d+)\)/)?.[1]||'';const inp=document.createElement('input');inp.type='text';inp.value=oldName;inp.className='life-input';inp.style.cssText='font-size:.74rem;font-weight:700;text-transform:uppercase;width:120px;padding:2px 6px;';el.innerHTML='';el.appendChild(inp);inp.focus();inp.select();function save(){const nv=inp.value.trim();if(nv&&nv!==oldName){state.lifeTasks.forEach(t=>{if(t.category===oldName)t.category=nv});const sel=$('#lifeNewCat');if(sel){const opts=Array.from(sel.options);const has=opts.some(o=>o.value===nv);if(!has){const o=document.createElement('option');o.value=nv;o.textContent=nv;sel.appendChild(o)}}}render();scheduleSave()}inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();save()}else if(e.key==='Escape')render()});inp.addEventListener('blur',save)}

// ===== TASKS TAB DRAG =====
let lifeDragId=null,lifeDragCat=null,dragCatName=null;
function lifeItemDragStart(e,id,cat){lifeDragId=id;lifeDragCat=cat;dragCatName=null;e.dataTransfer.effectAllowed='move';e.currentTarget.classList.add('dragging')}
function lifeItemDragOver(e){e.preventDefault();if(dragCatName)return;e.currentTarget.classList.add('drag-over-item')}
function lifeItemDragLeave(e){e.currentTarget.classList.remove('drag-over-item')}
function lifeItemDrop(e,targetId,targetCat){e.preventDefault();e.currentTarget.classList.remove('drag-over-item');if(lifeDragId===null||lifeDragId===targetId)return;const t=state.lifeTasks.find(t=>t.id===lifeDragId);if(!t)return;if(targetCat&&targetCat!==t.category)t.category=targetCat;const arr=state.lifeTasks;const fromIdx=arr.findIndex(x=>x.id===lifeDragId);const toIdx=arr.findIndex(x=>x.id===targetId);const[item]=arr.splice(fromIdx,1);arr.splice(toIdx,0,item);lifeDragId=null;render();scheduleSave()}
function lifeCatDragStart(e,cat){dragCatName=cat;lifeDragId=null;e.dataTransfer.setData('text/plain','cat:'+cat);e.dataTransfer.effectAllowed='move'}
function lifeCatDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over')}
function lifeCatDragLeave(e){e.currentTarget.classList.remove('drag-over')}
function lifeCatDrop(e,targetCat){e.preventDefault();e.currentTarget.classList.remove('drag-over');if(lifeDragId!==null){const t=state.lifeTasks.find(t=>t.id===lifeDragId);if(t){t.category=targetCat;lifeDragId=null;render();scheduleSave();return}}if(dragCatName&&dragCatName!==targetCat){if(!state.catOrder)state.catOrder=[];const cats=new Set();state.lifeTasks.filter(t=>!t.done).forEach(t=>{const c=t.category||'General';cats.add(c)});let order=state.catOrder.filter(c=>cats.has(c));cats.forEach(c=>{if(!order.includes(c))order.push(c)});const fi=order.indexOf(dragCatName),ti=order.indexOf(targetCat);if(fi>=0&&ti>=0){order.splice(fi,1);order.splice(ti,0,dragCatName);state.catOrder=order}dragCatName=null;render();scheduleSave()}}

// ===== SYLLABUS =====
function hideSylWeek(wkN){if(!state.hiddenSylWeeks)state.hiddenSylWeeks=[];if(!state.hiddenSylWeeks.includes(wkN))state.hiddenSylWeeks.push(wkN);render();scheduleSave()}
function expandSylWeek(wkN){state.hiddenSylWeeks=(state.hiddenSylWeeks||[]).filter(w=>w!==wkN);render();scheduleSave()}
function hideSylDay(date){if(!state.hiddenSylDays)state.hiddenSylDays=[];if(!state.hiddenSylDays.includes(date))state.hiddenSylDays.push(date);render();scheduleSave()}
function expandSylDays(wkN){const weeks=generateWeeks();const wk=weeks.find(w=>w.num===wkN);if(!wk){state.hiddenSylDays=[];render();scheduleSave();return}const dates=wk.days.map(d=>d.date);state.hiddenSylDays=(state.hiddenSylDays||[]).filter(d=>!dates.includes(d));render();scheduleSave()}
function toggleSylHL(id){const s=(state.syllabus||[]).find(s=>s.id===id);if(!s)return;s.highlighted=!s.highlighted;render();scheduleSave()}
function toggleSylDone(id){const s=(state.syllabus||[]).find(s=>s.id===id);if(!s)return;s.done=!s.done;if(s.done){state.tasks.forEach(t=>{if(t.syllabusId===id)t.done=true})}render();scheduleSave()}
function inlineSylEdit(id,field,el){const s=(state.syllabus||[]).find(s=>s.id===id);if(!s)return;
if(field==='title'){const inp=document.createElement('input');inp.type='text';inp.value=s.title;inp.className='syl-title-edit';el.replaceWith(inp);inp.focus();inp.select();function save(){s.title=inp.value.trim()||s.title;render();scheduleSave()}inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();save()}else if(e.key==='Escape')render()});inp.addEventListener('blur',save)}
else if(field==='detail'){const ta=document.createElement('textarea');ta.value=s.detail||'';ta.className='syl-detail-edit';ta.rows=Math.max(2,(s.detail||'').split('\n').length+1);el.replaceWith(ta);ta.focus();function save(){s.detail=ta.value;render();scheduleSave()}ta.addEventListener('keydown',e=>{if(e.key==='Escape')render()});ta.addEventListener('blur',save)}}
function deleteSylEntry(id){if(!confirm('Delete syllabus entry?'))return;state.syllabus=(state.syllabus||[]).filter(s=>s.id!==id);render();scheduleSave()}
function addSylEntry(){const title=$('#sylNewTitle')?.value.trim();if(!title)return;const newId=state.nextId++;const dueVal=normalizeDateInput($('#sylNewDue')?.value?.trim())||isoDate(TODAY);const dueEndVal='';state.syllabus.push({id:newId,cat:$('#sylNewCat').value,type:$('#sylNewType').value,title,detail:$('#sylNewDetail')?.value||'',due:dueVal,dueEnd:dueEndVal,hours:0,done:false,highlighted:false});$('#sylNewTitle').value='';$('#sylNewDue').value='';$('#sylNewDetail').value='';render();scheduleSave();setTimeout(()=>{const wk=semesterWeekNum(parseDate(dueVal));const sec=document.querySelector(`.syl-week-section:has(.syl-week-hdr:first-child)`);const sections=document.querySelectorAll('.syl-week-section');for(const s of sections){if(s.querySelector('.syl-week-hdr')?.textContent?.includes('Week '+wk)){s.scrollIntoView({behavior:'smooth',block:'center'});break}}},60)}
function addSylType(id){const s=(state.syllabus||[]).find(s=>s.id===id);if(!s)return;const t=prompt('Enter type (reading, paper, exam, presentation, or custom):',s.type);if(t&&t.trim()){s.type=t.trim().toLowerCase();render();scheduleSave()}}
let editSylId=null;
function openSylEdit(id){editSylId=id;const s=(state.syllabus||[]).find(s=>s.id===id);if(!s)return;$('#sylModalTitle').textContent='Edit Syllabus Entry';$('#sTitle').value=s.title;$('#sDetail').value=s.detail||'';$('#sCat').value=s.cat;$('#sType').value=s.type;$('#sDue').value=s.due;$('#sDueEnd').value=s.dueEnd||'';$('#sDueEnd').min=s.due;$('#sHrs').value=s.hours;$('#sylModal').classList.add('open');$('#sDue').onchange=()=>{const v=$('#sDue').value;if(v)$('#sDueEnd').min=v;if(!$('#sDueEnd').value)$('#sDueEnd').value=v}}
$('#sSave').onclick=()=>{const s=(state.syllabus||[]).find(s=>s.id===editSylId);if(s){s.title=$('#sTitle').value;s.detail=$('#sDetail').value;s.cat=$('#sCat').value;s.type=$('#sType').value;s.due=normalizeDateInput($('#sDue').value)||s.due;s.dueEnd=normalizeDateInput($('#sDueEnd').value)||'';s.hours=parseFloat($('#sHrs').value)||0}$('#sylModal').classList.remove('open');render();scheduleSave()}
$('#sDel').onclick=()=>{if(!confirm('Delete syllabus entry?'))return;state.syllabus=(state.syllabus||[]).filter(s=>s.id!==editSylId);$('#sylModal').classList.remove('open');render();scheduleSave()}
$('#sCanc').onclick=()=>{$('#sylModal').classList.remove('open')}
$('#sylModal').onclick=e=>{if(e.target.id==='sylModal')$('#sylModal').classList.remove('open')}

// ===== EXPORT / IMPORT =====
function exportState(){
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'planner-backup-' + isoDate(new Date()) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importState(){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    try {
      const text = await file.text();
      const imported = JSON.parse(text);
      if(imported.tasks && imported.lifeTasks){
        state = {...state, ...imported};
        render();
        scheduleSave();
        alert('Backup restored successfully!');
      } else {
        alert('Invalid backup file.');
      }
    } catch(err){
      alert('Error reading file: ' + err.message);
    }
  };
  input.click();
}
function bumpOverdueTasks(){const todayStr=isoDate(TODAY);let changed=false;const toReturn=state.tasks.filter(t=>!t.done&&t.date<todayStr);toReturn.forEach(t=>{if(t.lifeSourceId){const lt=state.lifeTasks.find(l=>l.id===t.lifeSourceId);if(lt){lt.inBank=true}}else{state.lifeTasks.push({id:state.nextId++,name:t.name,hours:t.hours||0,category:'General',priority:t.priority==='high'?'high':'med',due:'',done:false,inBank:true})}changed=true});state.tasks=state.tasks.filter(t=>t.done||t.date>=todayStr);if(changed)scheduleSave()}
function migrateEventTasks(){const evtTasks=state.tasks.filter(t=>t.cat==='events');if(!evtTasks.length)return;if(!state.events)state.events=[];evtTasks.forEach(t=>{const exists=(state.events||[]).some(e=>e.name===t.name&&e.date===t.date);if(!exists){state.events.push({id:state.nextId++,name:t.name,date:t.date,endDate:'',startTime:t.time||'',endTime:'',location:'',allDay:false})}});state.tasks=state.tasks.filter(t=>t.cat!=='events');scheduleSave()}
function flushSync(){if(!localStorage.getItem(SKEY+'-dirty'))return;if(!navigator.onLine)return;try{fetch(SB_URL+'/rest/v1/'+SB_TABLE,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},body:JSON.stringify({id:'default',data:JSON.stringify(state),updated_at:new Date().toISOString()}),keepalive:true})}catch(e){}}
async function init(){await loadState();bumpOverdueTasks();migrateEventTasks();render();handleUrlAction();updateConn(navigator.onLine?'online':'offline');checkRemoteSync();setInterval(()=>{if(document.visibilityState==='visible'&&navigator.onLine)checkRemoteSync()},30000);window.addEventListener('online',()=>{updateConn('online');console.log('[sync] Back online, pushing dirty + pulling remote');setTimeout(()=>{syncIfDirty();checkRemoteSync()},500)});window.addEventListener('offline',()=>{updateConn('offline')});window.addEventListener('pagehide',flushSync);window.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')flushSync();else if(document.visibilityState==='visible'&&navigator.onLine){syncIfDirty();checkRemoteSync()}});if(localStorage.getItem(SKEY+'-dirty'))syncIfDirty();if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(e=>console.warn('SW reg failed:',e))}}
init();
